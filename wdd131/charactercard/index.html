<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>

<body>

    <main>
        <section class="card">
            <img class="image" id="character-image" alt="Character" />
            <h1 class="name" id="name"></h1>
            <div class="stats" id="stats">
                <p id="charclass"></p>
                <p id="level"></p>
                <p id="health"></p>
            </div>
            <div class="buttons">
                <button id="attacked">Attacked</button>
                <button id="leveledup">Level Up</button>
            </div>
        </section>
    </main>

</body>

</html>
