<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FSY Counselor Preference Form</title>
    <link rel="icon" href="./favicon.png">
    <link rel="stylesheet" href="form.css" />
    <script src="form.js" defer></script>
</head>

<body>
    <main class="wrapper">
        <h1>FSY Counselor Preference Form</h1>

        <form id="fsyForm">
            <div class="field">
                <label for="firstName">First Name</label>
                <input id="firstName" name="firstName" type="text" required />
            </div>

            <div class="field">
                <label for="lastName">Last Name</label>
                <input id="lastName" name="lastName" type="text" required />
            </div>

            <div class="field full">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required />
            </div>

            <div class="field">
                <label for="travelRange">Willing to Serve In</label>
                <select id="travelRange" name="travelRange" aria-controls="notesContainer" required>
                    <option value="">Choose one</option>
                    <option value="one">One campus</option>
                    <option value="many">Two or more campuses</option>
                </select>
            </div>

            <div class="field">
                <label for="availableDate">Available Start Date</label>
                <input id="availableDate" name="availableDate" type="date" required />
            </div>

            <fieldset class="full campus-group">
                <legend>Campuses you are willing to serve at</legend>

                <div class="campus-grid">
                    <label><input type="checkbox" name="campus" value="BYU - Provo, Utah" /> Brigham Young University
                        (BYU) - Provo, Utah</label>
                    <label><input type="checkbox" name="campus" value="BYU-Idaho - Rexburg, Idaho" /> Brigham Young
                        University-Idaho (BYU-Idaho) - Rexburg, Idaho</label>
                    <label><input type="checkbox" name="campus"
                            value="Southern Virginia University - Buena Vista, Virginia" /> Southern Virginia University
                        - Buena Vista, Virginia</label>
                    <label><input type="checkbox" name="campus"
                            value="University of Maryland - College Park, Maryland" /> University of Maryland - College
                        Park, Maryland</label>
                    <label><input type="checkbox" name="campus"
                            value="University of North Georgia - Dahlonega, Georgia" /> University of North Georgia -
                        Dahlonega, Georgia</label>
                    <label><input type="checkbox" name="campus"
                            value="San Diego State University - San Diego, California" /> San Diego State University -
                        San Diego, California</label>
                    <label><input type="checkbox" name="campus" value="University of Idaho - Moscow, Idaho" />
                        University of Idaho - Moscow, Idaho</label>
                    <label><input type="checkbox" name="campus" value="Utah State University - Logan, Utah" /> Utah
                        State University - Logan, Utah</label>
                    <label><input type="checkbox" name="campus"
                            value="Pacific Lutheran University - Tacoma, Washington" /> Pacific Lutheran University -
                        Tacoma, Washington</label>
                    <label><input type="checkbox" name="campus" value="Stetson University - DeLand, Florida" /> Stetson
                        University - DeLand, Florida</label>
                </div>
            </fieldset>

            <div id="notesContainer" class="field full" hidden>
                <label for="notes">Travel Notes</label>
                <input id="notes" name="notes" type="text" />
            </div>

            <button class="full" type="submit">Submit Preferences</button>
        </form>

        <section id="output" aria-live="polite"></section>
    </main>
</body>

</html>
