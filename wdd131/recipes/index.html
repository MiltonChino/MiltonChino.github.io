<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="A collection of delicious recipes.">
    <meta name="author" content="Milton Chino">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="RecipeBook">
    <meta property="og:description" content="A collection of delicious recipes">
    <meta property="og:url" content="">
    <meta property="og:image" content="recipe-book.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="RecipeBook">
    <meta name="twitter:description" content="A collection of delicious recipes">
    <meta name="twitter:image" content="recipe-book.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="./images/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="./images/apple-touch-icon.png">


    <title>Recipes</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <img src="recipe-book.png" alt="Recipe Book Icon" class="logo-img">
                <span class="logo-text">RECIPEBOOK</span>
            </div>
        </header>

        <main>
            <form class="search-form" action="#" id="search-form">
                <div class="search-container">
                    <input type="text" name="search" placeholder="Find a recipe" aria-label="Search recipes">
                    <button type="submit" class="search-btn" id="search">
                        <img src="search.svg" alt="Search Icon">
                    </button>
                </div>
            </form>

            <hr class="divider">
            <div id="recipe-container">
            </div>
        </main>

        <footer>
            <div class="footer-attribution">
                <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by
                    Freepik - Flaticon</a>
            </div>
            <div class="footer-social">
                <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
                <a href="#" aria-label="Instagram"><img src="instagram_icon.svg" alt="Instagram Icon"></a>
                <a href="#" aria-label="YouTube"><img src="youtube_icon.svg" alt="YouTube Icon"></a>
                <a href="#" aria-label="Pinterest"><img src="pinterest_icon.svg" alt="Pinterest Icon"></a>
            </div>
        </footer>
    </div>
</body>

</html>
