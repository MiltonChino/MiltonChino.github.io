<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="A collection of delicious recipes.">
    <meta name="author" content="Milton Chino">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Title">
    <meta property="og:description" content="Your Description">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">


    <title>Recipes</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <img src="recipe-book.png" alt="Recipe Book Icon" class="logo-img">
                <span class="logo-text">RECIPEBOOK</span>
            </div>
        </header>

        <main>
            <form class="search-form" action="#">
                <div class="search-container">
                    <input type="text" name="search" placeholder="Find a recipe" aria-label="Search recipes">
                    <button type="submit" class="search-btn">
                        <img src="search.svg" alt="Search Icon">
                    </button>
                </div>
            </form>

            <hr class="divider">

            <section class="recipe-card">
                <div class="recipe-img-container">
                    <img src="apple-crisp.jpg" alt="Apple Crisp" class="recipe-img">
                </div>
                <div class="recipe-info">
                    <span class="recipe-badge">dessert</span>
                    <h2 class="recipe-title">APPLE CRISP</h2>
                    <div class="recipe-rating" role="img" aria-label="Rating: 4 out of 5 stars">
                        <span aria-hidden="true" class="star filled">★</span>
                        <span aria-hidden="true" class="star filled">★</span>
                        <span aria-hidden="true" class="star filled">★</span>
                        <span aria-hidden="true" class="star filled">★</span>
                        <span aria-hidden="true" class="star empty">☆</span>
                    </div>
                    <p class="recipe-desc">This apple crisp recipe is a simple yet delicious fall dessert that's great
                        served warm with vanilla ice cream.</p>
                </div>
            </section>
        </main>

        <footer>
            <div class="footer-attribution">
                <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by
                    Freepik - Flaticon</a>
            </div>
            <div class="footer-social">
                <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
                <a href="#" aria-label="Instagram"><img src="instagram_icon.svg" alt="Instagram Icon"></a>
                <a href="#" aria-label="YouTube"><img src="youtube_icon.svg" alt="YouTube Icon"></a>
                <a href="#" aria-label="Pinterest"><img src="pinterest_icon.svg" alt="Pinterest Icon"></a>
            </div>
        </footer>
    </div>
</body>

</html>
