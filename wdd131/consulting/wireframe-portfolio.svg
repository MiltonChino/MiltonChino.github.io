<svg width="800" height="900" viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles -->
  <style>
    .frame { fill: #F8FAFC; stroke: #0F172A; stroke-width: 2; }
    .box { fill: #FFFFFF; stroke: #0F172A; stroke-width: 1.5; }
    .image-placeholder { fill: #FFFFFF; stroke: #64748B; stroke-width: 1.5; }
    .image-x { stroke: #64748B; stroke-width: 1.5; }
    .text-title { font-family: 'Inter', monospace, Courier, sans-serif; font-size: 18px; font-weight: bold; fill: #0F172A; }
    .text-body { font-family: 'Inter', monospace, Courier, sans-serif; font-size: 14px; fill: #0F172A; }
    .text-muted { font-family: 'Inter', monospace, Courier, sans-serif; font-size: 12px; fill: #64748B; }
    .btn { fill: #FFFFFF; stroke: #0F172A; stroke-width: 1.5; rx: 3px; }
  </style>
  
  <!-- Outer Window Frame -->
  <rect x="10" y="10" width="780" height="880" rx="10" class="frame" />
  
  <!-- Header Bar -->
  <line x1="10" y1="70" x2="790" y2="70" stroke="#0F172A" stroke-width="2" />
  
  <!-- Logo Placeholder -->
  <rect x="30" y="25" width="30" height="30" class="image-placeholder" />
  <line x1="30" y1="25" x2="60" y2="55" class="image-x" />
  <line x1="60" y1="25" x2="30" y2="55" class="image-x" />
  <text x="70" y="46" class="text-title">LOGO</text>
  
  <!-- Nav links -->
  <text x="560" y="46" class="text-body" text-anchor="end">Portfolio</text>
  <text x="580" y="46" class="text-body">|</text>
  <text x="610" y="46" class="text-body">Estimator</text>
  
  <!-- Featured Work Section -->
  <text x="30" y="115" class="text-title">Featured work</text>
  <rect x="30" y="135" width="740" height="150" class="box" />
  <!-- Featured Image Placeholder -->
  <rect x="50" y="155" width="160" height="110" class="image-placeholder" />
  <line x1="50" y1="155" x2="210" y2="265" class="image-x" />
  <line x1="210" y1="155" x2="50" y2="265" class="image-x" />
  <!-- Featured Text -->
  <text x="240" y="180" class="text-title">Project 1</text>
  <text x="240" y="205" class="text-body">Web App</text>
  <text x="240" y="235" class="text-muted">Description</text>
  
  <!-- Our Work Section -->
  <text x="30" y="325" class="text-title">Our Work</text>
  
  <!-- Search -->
  <text x="30" y="365" class="text-body">Search</text>
  <rect x="90" y="348" width="220" height="25" class="box" />
  
  <!-- Filters -->
  <text x="30" y="410" class="text-body">Filter:</text>
  <!-- [All] -->
  <rect x="100" y="393" width="60" height="25" class="btn" />
  <text x="130" y="410" class="text-body" text-anchor="middle">All</text>
  <!-- [Web Apps] -->
  <rect x="170" y="393" width="100" height="25" class="btn" />
  <text x="220" y="410" class="text-body" text-anchor="middle">Web Apps</text>
  <!-- [Mobile] -->
  <rect x="280" y="393" width="80" height="25" class="btn" />
  <text x="320" y="410" class="text-body" text-anchor="middle">Mobile</text>
  <!-- [E-commerce] -->
  <rect x="370" y="393" width="110" height="25" class="btn" />
  <text x="425" y="410" class="text-body" text-anchor="middle">E-commerce</text>
  
  <!-- Cards Grid (3 Columns, 2 Rows) -->
  <!-- Column 1: X=30, Column 2: X=285, Column 3: X=540 -->
  <!-- Row 1: Y=445, Row 2: Y=645 -->
  
  <!-- Card 1 -->
  <rect x="30" y="445" width="230" height="170" class="box" />
  <rect x="45" y="460" width="40" height="40" class="image-placeholder" />
  <line x1="45" y1="460" x2="85" y2="500" class="image-x" />
  <line x1="85" y1="460" x2="45" y2="500" class="image-x" />
  <text x="45" y="525" class="text-title">Project 1</text>
  <text x="45" y="550" class="text-body">Web App</text>
  
  <!-- Card 2 -->
  <rect x="285" y="445" width="230" height="170" class="box" />
  <rect x="300" y="460" width="40" height="40" class="image-placeholder" />
  <line x1="300" y1="460" x2="340" y2="500" class="image-x" />
  <line x1="340" y1="460" x2="300" y2="500" class="image-x" />
  <text x="300" y="525" class="text-title">Project 2</text>
  <text x="300" y="550" class="text-body">Mobile</text>
  
  <!-- Card 3 -->
  <rect x="540" y="445" width="230" height="170" class="box" />
  <rect x="555" y="460" width="40" height="40" class="image-placeholder" />
  <line x1="555" y1="460" x2="595" y2="500" class="image-x" />
  <line x1="595" y1="460" x2="555" y2="500" class="image-x" />
  <text x="555" y="525" class="text-title">Project 3</text>
  <text x="555" y="550" class="text-body">Web App</text>
  
  <!-- Card 4 -->
  <rect x="30" y="645" width="230" height="170" class="box" />
  <rect x="45" y="660" width="40" height="40" class="image-placeholder" />
  <line x1="45" y1="660" x2="85" y2="700" class="image-x" />
  <line x1="85" y1="660" x2="45" y2="700" class="image-x" />
  <text x="45" y="725" class="text-title">Project 4</text>
  <text x="45" y="750" class="text-body">E-commerce</text>
  
  <!-- Card 5 -->
  <rect x="285" y="645" width="230" height="170" class="box" />
  <rect x="300" y="660" width="40" height="40" class="image-placeholder" />
  <line x1="300" y1="660" x2="340" y2="700" class="image-x" />
  <line x1="340" y1="660" x2="300" y2="700" class="image-x" />
  <text x="300" y="725" class="text-title">Project 5</text>
  <text x="300" y="750" class="text-body">Mobile</text>
  
  <!-- Card 6 -->
  <rect x="540" y="645" width="230" height="170" class="box" />
  <rect x="555" y="660" width="40" height="40" class="image-placeholder" />
  <line x1="555" y1="660" x2="595" y2="700" class="image-x" />
  <line x1="595" y1="660" x2="555" y2="700" class="image-x" />
  <text x="555" y="725" class="text-title">Project 6</text>
  <text x="555" y="750" class="text-body">E-commerce</text>
</svg>
