<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <!-- Video Platform Window -->
  <rect x="50" y="30" width="300" height="190" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1.5"/>
  
  <!-- Video Player area -->
  <rect x="65" y="45" width="180" height="120" rx="6" fill="#0F172A"/>
  
  <!-- Video Play Button -->
  <circle cx="155" cy="105" r="20" fill="url(#emeraldGrad)" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.3))"/>
  <polygon points="150,95 166,105 150,115" fill="#F8FAFC"/>
  
  <!-- Video duration indicator bar -->
  <rect x="75" y="150" width="160" height="4" rx="2" fill="#334155"/>
  <rect x="75" y="150" width="110" height="4" rx="2" fill="#10B981"/>
  <circle cx="185" cy="152" r="4" fill="#10B981"/>
  
  <!-- Sidebar/Class chat/course list in platform -->
  <rect x="255" y="45" width="80" height="120" rx="6" fill="#0F172A"/>
  <rect x="262" y="55" width="66" height="8" rx="2" fill="#334155"/>
  <rect x="262" y="68" width="66" height="8" rx="2" fill="#334155"/>
  <rect x="262" y="81" width="66" height="8" rx="2" fill="#10B981" opacity="0.6"/>
  <rect x="262" y="94" width="66" height="8" rx="2" fill="#334155"/>
  
  <!-- Bottom info block -->
  <rect x="65" y="175" width="270" height="35" rx="6" fill="#0F172A"/>
  <circle cx="85" cy="192" r="10" fill="#475569"/>
  <rect x="105" y="184" width="120" height="6" rx="2" fill="#F8FAFC"/>
  <rect x="105" y="194" width="80" height="4" rx="2" fill="#94A3B8"/>
</svg>
