<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
    <linearGradient id="avocadoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#84CC16"/>
      <stop offset="100%" stop-color="#4D7C0F"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <!-- Browser Frame Mockup -->
  <rect x="30" y="20" width="340" height="210" rx="10" fill="#FFFFFF" stroke="#FDE68A" stroke-width="2"/>
  
  <!-- Browser Header Bar -->
  <path d="M30 45 L370 45" stroke="#FEF3C7" stroke-width="2"/>
  <circle cx="45" cy="33" r="4" fill="#EF4444"/>
  <circle cx="57" cy="33" r="4" fill="#F59E0B"/>
  <circle cx="69" cy="33" r="4" fill="#10B981"/>
  <rect x="90" y="27" width="220" height="12" rx="6" fill="#FEF3C7"/>
  <text x="200" y="36" font-family="'Inter', sans-serif" font-size="7" fill="#B45309" text-anchor="middle">asesoria-nutricional-landing.my.canva.site</text>
  
  <!-- Hero Banner inside Mockup -->
  <rect x="42" y="55" width="316" height="160" rx="8" fill="#FFFBEB"/>
  
  <!-- Decorative Avocado Illustration -->
  <g transform="translate(260, 80)">
    <!-- Outer avocado shell -->
    <path d="M40 0 C65 0 80 25 80 55 C80 80 60 100 40 100 C20 100 0 80 0 55 C0 25 15 0 40 0 Z" fill="url(#avocadoGrad)"/>
    <!-- Inner avocado flesh -->
    <path d="M40 8 C58 8 70 28 70 54 C70 74 54 90 40 90 C26 90 10 74 10 54 C10 28 22 8 40 8 Z" fill="#ECFDF5"/>
    <!-- Seed -->
    <circle cx="40" cy="62" r="16" fill="#78350F"/>
    <circle cx="36" cy="58" r="4" fill="#9A3412" opacity="0.6"/>
  </g>
  
  <!-- Main Banner Text -->
  <text x="55" y="80" font-family="'Inter', sans-serif" font-size="8" font-weight="700" fill="#EA580C" letter-spacing="1">HEALTHY LIFESTYLE</text>
  <text x="55" y="106" font-family="'Inter', sans-serif" font-size="16" font-weight="900" fill="#9A3412">NUTRITIONAL</text>
  <text x="55" y="126" font-family="'Inter', sans-serif" font-size="16" font-weight="900" fill="#9A3412">ADVISORY</text>
  <text x="55" y="146" font-family="'Inter', sans-serif" font-size="8" font-weight="600" fill="#D97706">PERSONALIZED CONSULTATIONS &amp; DIETS</text>
  
  <!-- CTA Button inside mockup -->
  <rect x="55" y="160" width="130" height="28" rx="14" fill="url(#orangeGrad)"/>
  <text x="120" y="178" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" text-anchor="middle">BOOK CONSULTATION</text>
</svg>
