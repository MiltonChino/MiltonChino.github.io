<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <!-- Browser Frame Mockup -->
  <rect x="50" y="30" width="300" height="190" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  
  <!-- Browser Bar -->
  <path d="M50 55 L350 55" stroke="#E2E8F0" stroke-width="1"/>
  <circle cx="65" cy="42" r="4" fill="#EF4444"/>
  <circle cx="77" cy="42" r="4" fill="#F59E0B"/>
  <circle cx="89" cy="42" r="4" fill="#10B981"/>
  <rect x="110" y="36" width="180" height="12" rx="6" fill="#E2E8F0"/>
  <text x="200" y="45" font-family="'Inter', sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">ecoshop-store.com</text>
  
  <!-- Content: Shop Grid -->
  <!-- Hero banner inside browser -->
  <rect x="65" y="65" width="270" height="40" rx="6" fill="url(#emeraldGrad)"/>
  <text x="80" y="88" font-family="'Inter', sans-serif" font-size="12" font-weight="800" fill="#F8FAFC">Summer Eco Sale</text>
  
  <!-- Product Cards -->
  <!-- Card 1 -->
  <rect x="65" y="115" width="80" height="70" rx="6" fill="#E2E8F0"/>
  <rect x="75" y="125" width="60" height="30" rx="4" fill="#CBD5E1"/>
  <rect x="75" y="162" width="40" height="6" rx="2" fill="#94A3B8"/>
  <rect x="75" y="172" width="25" height="6" rx="2" fill="#10B981"/>
  
  <!-- Card 2 -->
  <rect x="160" y="115" width="80" height="70" rx="6" fill="#E2E8F0"/>
  <rect x="170" y="125" width="60" height="30" rx="4" fill="#CBD5E1"/>
  <rect x="170" y="162" width="45" height="6" rx="2" fill="#94A3B8"/>
  <rect x="170" y="172" width="25" height="6" rx="2" fill="#10B981"/>

  <!-- Card 3 -->
  <rect x="255" y="115" width="80" height="70" rx="6" fill="#E2E8F0"/>
  <rect x="265" y="125" width="60" height="30" rx="4" fill="#CBD5E1"/>
  <rect x="265" y="162" width="35" height="6" rx="2" fill="#94A3B8"/>
  <rect x="265" y="172" width="25" height="6" rx="2" fill="#10B981"/>

  <!-- Shopping Cart Icon floating -->
  <circle cx="320" cy="85" r="16" fill="#0F172A" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.15))"/>
  <path d="M312 80 H315 L318 89 H327 L329 82 H317" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="319" cy="92" r="1.5" fill="#10B981"/>
  <circle cx="326" cy="92" r="1.5" fill="#10B981"/>
</svg>
