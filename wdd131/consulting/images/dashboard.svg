<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <!-- Grid Lines -->
  <g stroke="#334155" stroke-width="0.5" stroke-dasharray="4 4">
    <line x1="50" y1="0" x2="50" y2="250"/>
    <line x1="150" y1="0" x2="150" y2="250"/>
    <line x1="250" y1="0" x2="250" y2="250"/>
    <line x1="350" y1="0" x2="350" y2="250"/>
  </g>
  
  <!-- Dashboard Main Window -->
  <rect x="40" y="30" width="320" height="190" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1.5"/>
  
  <!-- Sidebar in Dashboard -->
  <rect x="40" y="30" width="60" height="190" rx="8" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <circle cx="70" cy="50" r="10" fill="#10B981" opacity="0.8"/>
  <rect x="50" y="75" width="40" height="6" rx="2" fill="#334155"/>
  <rect x="50" y="95" width="40" height="6" rx="2" fill="#334155"/>
  <rect x="50" y="115" width="40" height="6" rx="2" fill="#334155"/>
  
  <!-- Dashboard Top Nav -->
  <rect x="100" y="30" width="260" height="35" fill="#1E293B"/>
  <line x1="100" y1="65" x2="360" y2="65" stroke="#475569" stroke-width="1"/>
  <rect x="115" y="42" width="80" height="10" rx="3" fill="#334155"/>
  <circle cx="330" cy="47" r="8" fill="#475569"/>
  
  <!-- Metrics Cards -->
  <rect x="115" y="80" width="70" height="40" rx="6" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="125" y="95" font-family="'Inter', sans-serif" font-size="6" font-weight="600" fill="#94A3B8">ACTIVE USERS</text>
  <text x="125" y="112" font-family="'Inter', sans-serif" font-size="12" font-weight="800" fill="#10B981">14,280</text>
  
  <rect x="195" y="80" width="70" height="40" rx="6" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="205" y="95" font-family="'Inter', sans-serif" font-size="6" font-weight="600" fill="#94A3B8">CONVERSION</text>
  <text x="205" y="112" font-family="'Inter', sans-serif" font-size="12" font-weight="800" fill="#F8FAFC">2.4%</text>

  <rect x="275" y="80" width="70" height="40" rx="6" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="285" y="95" font-family="'Inter', sans-serif" font-size="6" font-weight="600" fill="#94A3B8">BOUNCE RATE</text>
  <text x="285" y="112" font-family="'Inter', sans-serif" font-size="12" font-weight="800" fill="#EF4444">42.1%</text>

  <!-- Large Graph Card -->
  <rect x="115" y="130" width="230" height="80" rx="6" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <path d="M125 190 Q150 170 170 180 T220 150 T270 160 T320 142 T335 155" fill="none" stroke="url(#emeraldGrad)" stroke-width="3" stroke-linecap="round"/>
  <!-- Chart fill gradient simulation -->
  <path d="M125 190 Q150 170 170 180 T220 150 T270 160 T320 142 T335 155 L335 200 L125 200 Z" fill="url(#emeraldGrad)" opacity="0.1"/>
  <line x1="125" y1="200" x2="335" y2="200" stroke="#334155" stroke-width="1"/>
</svg>
